version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finheal-postgres
    environment:
      POSTGRES_USER: finheal_user
      POSTGRES_PASSWORD: finheal_password
      POSTGRES_DB: finheal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finheal_user -d finheal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
